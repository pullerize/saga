# /etc/nginx/sites-available/saga
# Nginx reverse-proxy для Next.js на порту 3000.
# Активация:
#   sudo ln -s /etc/nginx/sites-available/saga /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL получить отдельно через:
#   sudo certbot --nginx -d saga-group.uz -d www.saga-group.uz

server {
    listen 80;
    server_name saga-group.uz www.saga-group.uz;   # ЗАМЕНИ на свой домен

    # Максимальный размер загружаемого файла (uploads иконок/фото)
    client_max_body_size 20M;

    # Nginx сам отдаёт статику из public/ — быстрее, чем через Node.js
    root /var/www/saga/public;

    # Статика Next.js (хешированные ассеты — кеш на год)
    location /_next/static/ {
        alias /var/www/saga/.next/standalone/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Загруженные пользователем файлы (иконки вариантов, фото стекла и т.п.)
    location /uploads/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Остальной контент public/ (logo, favicon и т.п.)
    location ~* ^/(img|option|favicon\.ico|robots\.txt) {
        access_log off;
        expires 30d;
        try_files $uri @nextjs;
    }

    # Все прочие запросы идут в Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
